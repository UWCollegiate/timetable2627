<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>course selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <script>
        window.assetVersion = Date.now();
        let stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `global.css?v=${window.assetVersion}`;
        document.head.appendChild(stylesheet);
    </script>
</head>
<body>
    <div id="top" class="top--actions">
        <a href="index.html" onclick="prepareForNavigation()">
            <h1>Course Selector</h1>
        </a>
        <!-- doing this because putting it in an <a> messes with the formating -->
        <button id="add" onclick="prepareForNavigation(); location.href = 'new.html'">Add Course</button>
        <button id="create" onclick="prepareForNavigation(); location.href = 'create.html'">Create Schedules</button>
    </div>
    <div id="main">
        <div id="courseContainer"></div>
    </div>
    <button id="restrictions" onclick="prepareForNavigation(); location.href = 'restrictions.html'">Change Restrictions</button>
    <script>
        function appendScript(src, type = "text/javascript") {
            let script = document.createElement("script");
            script.src = `${src}?v=${window.assetVersion}`;
            script.type = type;
            document.body.appendChild(script);
        }

        appendScript("js/global.js");
        appendScript("js/index.js");
    </script>
</body>
</html>
